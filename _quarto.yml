format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    grid:
      body-width: 900px
    include-in-header:
      - text: |
          <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    include-after-body:
      - text: |
          <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
          <script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
          <script>
            document.addEventListener('DOMContentLoaded', function () {
              // Typed.js rotating tagline (only on pages that have the target)
              var t = document.querySelector('#typed-target');
              if (t && window.Typed) {
                new Typed('#typed-target', {
                  strings: t.getAttribute('data-strings').split('|'),
                  typeSpeed: 55, backSpeed: 28, backDelay: 1600,
                  startDelay: 300, loop: true, smartBackspace: true
                });
              }
              // Animate-on-scroll: tag section headers and publication cards
              document.querySelectorAll(
                'main h2, main h3, .publications ul > li'
              ).forEach(function (el) {
                el.setAttribute('data-aos', 'fade-up');
                el.setAttribute('data-aos-duration', '600');
              });
              if (window.AOS) AOS.init({ once: true, offset: 60 });
            });
          </script>
